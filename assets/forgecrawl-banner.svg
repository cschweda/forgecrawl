<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradient - dark forge atmosphere -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="40%" style="stop-color:#111118"/>
      <stop offset="100%" style="stop-color:#0d0d14"/>
    </linearGradient>

    <!-- Ember glow gradient -->
    <radialGradient id="ember-glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#ea580c;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:0"/>
    </radialGradient>

    <!-- Top accent glow -->
    <radialGradient id="top-glow" cx="30%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:0"/>
    </radialGradient>

    <!-- Text gradient - molten metal -->
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fed7aa"/>
      <stop offset="30%" style="stop-color:#fb923c"/>
      <stop offset="60%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>

    <!-- Anvil gradient -->
    <linearGradient id="anvil-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4b5563"/>
      <stop offset="50%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>

    <!-- Spark filter -->
    <filter id="spark-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="noisy"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>

    <!-- Hammer shape -->
    <g id="hammer-icon">
      <!-- Hammer handle -->
      <rect x="-3" y="-40" width="6" height="48" rx="2" fill="#9ca3af" transform="rotate(-30)"/>
      <!-- Hammer head -->
      <rect x="-18" y="-52" width="36" height="16" rx="3" fill="url(#anvil-grad)" transform="rotate(-30)" stroke="#6b7280" stroke-width="1"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#ember-glow)"/>
  <rect width="1280" height="640" fill="url(#top-glow)"/>

  <!-- Subtle grid lines - forge workshop feel -->
  <g opacity="0.04" stroke="#f97316">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Decorative anvil silhouette - left side -->
  <g transform="translate(180, 340)" opacity="0.12">
    <!-- Anvil body -->
    <path d="M-60,20 L-40,-30 L-30,-30 L-25,-10 L25,-10 L30,-30 L40,-30 L60,20 L50,30 L-50,30 Z" fill="#f97316"/>
    <!-- Anvil top -->
    <rect x="-35" y="-40" width="70" height="12" rx="2" fill="#f97316"/>
    <!-- Anvil horn -->
    <path d="M-35,-34 L-70,-28 L-35,-28 Z" fill="#f97316"/>
  </g>

  <!-- Decorative code brackets - right side -->
  <g transform="translate(1080, 320)" opacity="0.08" fill="none" stroke="#f97316" stroke-width="3">
    <path d="M-20,-60 L-40,-60 L-40,60 L-20,60"/>
    <path d="M20,-60 L40,-60 L40,60 L20,60"/>
    <text x="-12" y="8" font-family="monospace" font-size="24" fill="#f97316" stroke="none">MD</text>
  </g>

  <!-- Sparks cluster - top left -->
  <g filter="url(#spark-glow)">
    <circle cx="240" cy="180" r="2" fill="#fbbf24" opacity="0.9"/>
    <circle cx="260" cy="165" r="1.5" fill="#fb923c" opacity="0.7"/>
    <circle cx="225" cy="195" r="1" fill="#fde68a" opacity="0.8"/>
    <circle cx="255" cy="190" r="1.8" fill="#f97316" opacity="0.6"/>
    <circle cx="235" cy="170" r="1.2" fill="#fbbf24" opacity="0.75"/>
    <circle cx="270" cy="178" r="1" fill="#fde68a" opacity="0.5"/>
    <circle cx="215" cy="185" r="1.5" fill="#fb923c" opacity="0.65"/>
  </g>

  <!-- Sparks cluster - right -->
  <g filter="url(#spark-glow)">
    <circle cx="1040" cy="250" r="1.5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="1055" cy="235" r="1" fill="#fde68a" opacity="0.6"/>
    <circle cx="1030" cy="260" r="1.8" fill="#fb923c" opacity="0.5"/>
    <circle cx="1060" cy="255" r="1.2" fill="#fbbf24" opacity="0.8"/>
  </g>

  <!-- Main title -->
  <g filter="url(#text-glow)">
    <text x="640" y="280" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="url(#text-gradient)" letter-spacing="-2">
      ForgeCrawl
    </text>
  </g>

  <!-- Subtle underline accent -->
  <rect x="440" y="300" width="400" height="2" rx="1" fill="#f97316" opacity="0.3"/>
  <rect x="520" y="300" width="240" height="2" rx="1" fill="#f97316" opacity="0.5"/>

  <!-- Tagline -->
  <text x="640" y="350" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="22" fill="#9ca3af" letter-spacing="1">
    Web content forged into Markdown for LLMs
  </text>

  <!-- Feature pills -->
  <g font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="13">
    <!-- Pill 1 -->
    <rect x="305" y="395" width="130" height="32" rx="16" fill="none" stroke="#f97316" stroke-opacity="0.3" stroke-width="1"/>
    <text x="370" y="416" text-anchor="middle" fill="#d97706">Self-Hosted</text>

    <!-- Pill 2 -->
    <rect x="455" y="395" width="150" height="32" rx="16" fill="none" stroke="#f97316" stroke-opacity="0.3" stroke-width="1"/>
    <text x="530" y="416" text-anchor="middle" fill="#d97706">Authenticated</text>

    <!-- Pill 3 -->
    <rect x="625" y="395" width="120" height="32" rx="16" fill="none" stroke="#f97316" stroke-opacity="0.3" stroke-width="1"/>
    <text x="685" y="416" text-anchor="middle" fill="#d97706">HTML → MD</text>

    <!-- Pill 4 -->
    <rect x="765" y="395" width="140" height="32" rx="16" fill="none" stroke="#f97316" stroke-opacity="0.3" stroke-width="1"/>
    <text x="835" y="416" text-anchor="middle" fill="#d97706">LLM-Ready</text>
  </g>

  <!-- Bottom decorative line -->
  <line x1="200" y1="500" x2="1080" y2="500" stroke="#f97316" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Version badge -->
  <g transform="translate(640, 480)">
    <rect x="-45" y="-12" width="90" height="24" rx="12" fill="#f97316" fill-opacity="0.1" stroke="#f97316" stroke-opacity="0.2" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="12" fill="#fb923c" text-transform="lowercase">beta</text>
  </g>

  <!-- Corner accents -->
  <path d="M0,0 L80,0 L80,3 L3,3 L3,80 L0,80 Z" fill="#f97316" opacity="0.15"/>
  <path d="M1280,0 L1200,0 L1200,3 L1277,3 L1277,80 L1280,80 Z" fill="#f97316" opacity="0.15"/>
  <path d="M0,640 L80,640 L80,637 L3,637 L3,560 L0,560 Z" fill="#f97316" opacity="0.1"/>
  <path d="M1280,640 L1200,640 L1200,637 L1277,637 L1277,560 L1280,560 Z" fill="#f97316" opacity="0.1"/>
</svg>