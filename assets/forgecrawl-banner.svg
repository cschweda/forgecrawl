<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradient - deep forge darkness -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0804"/>
      <stop offset="40%" style="stop-color:#120c06"/>
      <stop offset="100%" style="stop-color:#0a0604"/>
    </linearGradient>

    <!-- Central forge fire glow - big and bright -->
    <radialGradient id="forge-fire" cx="50%" cy="55%" r="45%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.35"/>
      <stop offset="25%" style="stop-color:#ea580c;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#c2410c;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#0a0604;stop-opacity:0"/>
    </radialGradient>

    <!-- Bottom forge hearth glow -->
    <radialGradient id="hearth-glow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.15"/>
      <stop offset="30%" style="stop-color:#ea580c;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0a0604;stop-opacity:0"/>
    </radialGradient>

    <!-- Top heat haze -->
    <radialGradient id="heat-top" cx="50%" cy="0%" r="50%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.12"/>
      <stop offset="60%" style="stop-color:#ea580c;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#0a0604;stop-opacity:0"/>
    </radialGradient>

    <!-- Left kiln glow -->
    <radialGradient id="kiln-left" cx="12%" cy="55%" r="25%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#ea580c;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#0a0604;stop-opacity:0"/>
    </radialGradient>

    <!-- Right kiln glow -->
    <radialGradient id="kiln-right" cx="88%" cy="55%" r="25%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#ea580c;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#0a0604;stop-opacity:0"/>
    </radialGradient>

    <!-- Text gradient - white-hot to molten orange -->
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff7ed"/>
      <stop offset="20%" style="stop-color:#fed7aa"/>
      <stop offset="50%" style="stop-color:#fb923c"/>
      <stop offset="80%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>

    <!-- Anvil gradient - dark steel -->
    <linearGradient id="anvil-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4b5563"/>
      <stop offset="50%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>

    <!-- Spark filter - brighter -->
    <filter id="spark-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Big spark filter -->
    <filter id="big-spark">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow - subtle -->
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ember particle filter -->
    <filter id="ember-filter">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#forge-fire)"/>
  <rect width="1280" height="640" fill="url(#hearth-glow)"/>
  <rect width="1280" height="640" fill="url(#heat-top)"/>
  <rect width="1280" height="640" fill="url(#kiln-left)"/>
  <rect width="1280" height="640" fill="url(#kiln-right)"/>

  <!-- Molten cracks / veins in the forge floor -->
  <g opacity="0.08" stroke="#f97316" stroke-width="1" fill="none">
    <path d="M100,580 Q200,560 280,590 Q350,540 420,570"/>
    <path d="M500,600 Q580,550 640,580 Q700,540 780,570 Q850,590 920,560"/>
    <path d="M960,590 Q1020,550 1080,580 Q1140,560 1200,590"/>
  </g>
  <g opacity="0.12" stroke="#ea580c" stroke-width="0.5" fill="none">
    <path d="M200,620 Q320,590 400,620"/>
    <path d="M600,630 Q700,600 800,625"/>
    <path d="M900,615 Q1000,595 1100,620"/>
  </g>

  <!-- Heat shimmer lines rising -->
  <g opacity="0.04" stroke="#fb923c" stroke-width="1" fill="none">
    <path d="M300,500 Q310,400 290,300 Q300,200 310,100"/>
    <path d="M500,520 Q490,420 510,320 Q500,220 490,120"/>
    <path d="M700,510 Q710,410 690,310 Q700,210 710,110"/>
    <path d="M900,500 Q890,400 910,300 Q900,200 890,100"/>
    <path d="M1050,510 Q1060,410 1040,310 Q1050,220 1060,120"/>
    <path d="M200,510 Q190,410 210,310 Q200,220 190,130"/>
  </g>

  <!-- Forge workshop grid - warmer tone -->
  <g opacity="0.03" stroke="#fb923c">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Anvil silhouette - left, more visible -->
  <g transform="translate(160, 340)" opacity="0.2">
    <path d="M-60,20 L-40,-30 L-30,-30 L-25,-10 L25,-10 L30,-30 L40,-30 L60,20 L50,30 L-50,30 Z" fill="#f97316"/>
    <rect x="-35" y="-40" width="70" height="12" rx="2" fill="#f97316"/>
    <path d="M-35,-34 L-70,-28 L-35,-28 Z" fill="#f97316"/>
  </g>

  <!-- Hammer silhouette above anvil -->
  <g transform="translate(185, 260) rotate(-35)" opacity="0.15">
    <rect x="-4" y="-5" width="8" height="55" rx="3" fill="#fb923c"/>
    <rect x="-16" y="-18" width="32" height="16" rx="3" fill="#fb923c"/>
  </g>

  <!-- Code brackets - right, more visible -->
  <g transform="translate(1100, 320)" opacity="0.12" fill="none" stroke="#f97316" stroke-width="3">
    <path d="M-20,-60 L-40,-60 L-40,60 L-20,60"/>
    <path d="M20,-60 L40,-60 L40,60 L20,60"/>
    <text x="-12" y="8" font-family="monospace" font-size="24" fill="#f97316" stroke="none">MD</text>
  </g>

  <!-- Flying sparks - left cluster (from anvil strike) -->
  <g filter="url(#spark-glow)">
    <circle cx="220" cy="170" r="2.5" fill="#fde68a" opacity="0.95"/>
    <circle cx="245" cy="150" r="2" fill="#fbbf24" opacity="0.9"/>
    <circle cx="200" cy="190" r="1.5" fill="#fde68a" opacity="0.85"/>
    <circle cx="260" cy="175" r="2.2" fill="#fb923c" opacity="0.8"/>
    <circle cx="230" cy="155" r="1.8" fill="#fbbf24" opacity="0.9"/>
    <circle cx="275" cy="160" r="1.5" fill="#fde68a" opacity="0.7"/>
    <circle cx="195" cy="175" r="2" fill="#fb923c" opacity="0.75"/>
    <circle cx="250" cy="140" r="1.2" fill="#fde68a" opacity="0.85"/>
    <circle cx="215" cy="145" r="1.8" fill="#fbbf24" opacity="0.8"/>
    <circle cx="270" cy="185" r="1" fill="#fde68a" opacity="0.6"/>
  </g>

  <!-- Flying sparks - right cluster -->
  <g filter="url(#spark-glow)">
    <circle cx="1050" cy="240" r="2" fill="#fbbf24" opacity="0.85"/>
    <circle cx="1070" cy="220" r="1.5" fill="#fde68a" opacity="0.8"/>
    <circle cx="1035" cy="255" r="2.2" fill="#fb923c" opacity="0.7"/>
    <circle cx="1075" cy="250" r="1.8" fill="#fbbf24" opacity="0.9"/>
    <circle cx="1060" cy="230" r="1.2" fill="#fde68a" opacity="0.75"/>
    <circle cx="1045" cy="215" r="1.5" fill="#fbbf24" opacity="0.65"/>
  </g>

  <!-- Floating embers - scattered across image -->
  <g filter="url(#ember-filter)">
    <!-- Rising from bottom -->
    <circle cx="350" cy="520" r="1.5" fill="#f97316" opacity="0.5"/>
    <circle cx="480" cy="540" r="1" fill="#fb923c" opacity="0.4"/>
    <circle cx="620" cy="510" r="1.8" fill="#ea580c" opacity="0.45"/>
    <circle cx="780" cy="530" r="1.2" fill="#f97316" opacity="0.5"/>
    <circle cx="920" cy="515" r="1.5" fill="#fb923c" opacity="0.4"/>
    <!-- Mid-height -->
    <circle cx="130" cy="300" r="1" fill="#fbbf24" opacity="0.35"/>
    <circle cx="400" cy="200" r="1.2" fill="#f97316" opacity="0.3"/>
    <circle cx="880" cy="180" r="1" fill="#fb923c" opacity="0.3"/>
    <circle cx="1150" cy="350" r="1.5" fill="#f97316" opacity="0.35"/>
    <!-- High -->
    <circle cx="300" cy="80" r="1" fill="#fbbf24" opacity="0.25"/>
    <circle cx="550" cy="60" r="0.8" fill="#fb923c" opacity="0.2"/>
    <circle cx="750" cy="70" r="1" fill="#f97316" opacity="0.25"/>
    <circle cx="1000" cy="90" r="0.8" fill="#fbbf24" opacity="0.2"/>
  </g>

  <!-- Big accent glows - like coals -->
  <g filter="url(#big-spark)">
    <circle cx="160" cy="520" r="8" fill="#ea580c" opacity="0.08"/>
    <circle cx="1120" cy="500" r="6" fill="#ea580c" opacity="0.06"/>
    <circle cx="640" cy="560" r="10" fill="#dc2626" opacity="0.06"/>
  </g>

  <!-- Main title -->
  <g filter="url(#text-glow)">
    <text x="640" y="280" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="url(#text-gradient)" letter-spacing="-2">
      ForgeCrawl
    </text>
  </g>

  <!-- Underline accent - brighter -->
  <rect x="440" y="300" width="400" height="2" rx="1" fill="#f97316" opacity="0.4"/>
  <rect x="500" y="300" width="280" height="2" rx="1" fill="#fb923c" opacity="0.6"/>

  <!-- Tagline -->
  <text x="640" y="350" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="22" fill="#d4d4d8" letter-spacing="1">
    Web content forged into Markdown for LLMs
  </text>

  <!-- Feature pills -->
  <g font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="13">
    <rect x="340" y="395" width="130" height="32" rx="16" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-opacity="0.35" stroke-width="1"/>
    <text x="405" y="416" text-anchor="middle" fill="#fbbf24">Self-Hosted</text>

    <rect x="490" y="395" width="150" height="32" rx="16" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-opacity="0.35" stroke-width="1"/>
    <text x="565" y="416" text-anchor="middle" fill="#fbbf24">Authenticated</text>

    <rect x="660" y="395" width="120" height="32" rx="16" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-opacity="0.35" stroke-width="1"/>
    <text x="720" y="416" text-anchor="middle" fill="#fbbf24">HTML → MD</text>

    <rect x="800" y="395" width="140" height="32" rx="16" fill="#f97316" fill-opacity="0.06" stroke="#f97316" stroke-opacity="0.35" stroke-width="1"/>
    <text x="870" y="416" text-anchor="middle" fill="#fbbf24">LLM-Ready</text>
  </g>

  <!-- Bottom decorative line -->
  <line x1="200" y1="500" x2="1080" y2="500" stroke="#f97316" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Version badge -->
  <g transform="translate(640, 480)">
    <rect x="-45" y="-12" width="90" height="24" rx="12" fill="#f97316" fill-opacity="0.12" stroke="#f97316" stroke-opacity="0.3" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="12" fill="#fb923c" text-transform="lowercase">beta</text>
  </g>

  <!-- Corner accents - brighter -->
  <path d="M0,0 L80,0 L80,3 L3,3 L3,80 L0,80 Z" fill="#f97316" opacity="0.2"/>
  <path d="M1280,0 L1200,0 L1200,3 L1277,3 L1277,80 L1280,80 Z" fill="#f97316" opacity="0.2"/>
  <path d="M0,640 L80,640 L80,637 L3,637 L3,560 L0,560 Z" fill="#f97316" opacity="0.15"/>
  <path d="M1280,640 L1200,640 L1200,637 L1277,637 L1277,560 L1280,560 Z" fill="#f97316" opacity="0.15"/>
</svg>