name: forgecrawl

services:
  app:
    build:
      context: .
      dockerfile: packages/app/Dockerfile
    ports:
      - "${PORT:-5150}:5150"
    environment:
      NUXT_AUTH_SECRET: ${NUXT_AUTH_SECRET:-}
      NUXT_DATA_DIR: /app/data
    volumes:
      - forgecrawl-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5150/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  forgecrawl-data:
    driver: local
